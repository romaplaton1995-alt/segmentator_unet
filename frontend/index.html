<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BraTS 3D Viewer — MVP</title>
<style>
  body { margin: 0; background: #f4f6f8; color: #222; font-family: sans-serif; overflow: hidden; }
  #upload-panel {
    position: absolute; top: 15px; left: 15px; z-index: 100;
    background: rgba(255, 255, 255, 0.94); padding: 20px;
    border-radius: 12px; border: 1px solid #d5dbe3;
    width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }
  input[type="file"] { display: block; margin: 10px 0; width: 100%; font-size: 12px; }
  button {
    padding: 12px; width: 100%; cursor: pointer; background: #2563eb;
    color: white; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px;
  }
  #status { margin-top: 15px; font-size: 12px; color: #444; line-height: 1.4; }
  .control-group { margin-top: 15px; padding-top: 12px; border-top: 1px solid #d5dbe3; }
</style>
</head>
<body>

<div id="upload-panel">
  <div style="font-weight: bold; margin-bottom: 10px; color: #2563eb;">3D СЕГМЕНТАЦИЯ ОПУХОЛИ</div>

  <label>FLAIR <input type="file" id="flair" accept=".nii,.nii.gz"></label>
  <label>T1 <input type="file" id="t1" accept=".nii,.nii.gz"></label>
  <label>T1ce <input type="file" id="t1ce" accept=".nii,.nii.gz"></label>
  <label>T2 <input type="file" id="t2" accept=".nii,.nii.gz"></label>

  <button onclick="runPrediction()">НАЧАТЬ АНАЛИЗ</button>

  <div class="control-group">
    <div style="font-size: 13px; font-weight: bold; margin-bottom: 8px;">Разрез модели</div>
    <label style="display:block; font-size: 12px; margin-bottom: 8px;">
      <input type="checkbox" id="clipEnabled"> Включить разрез
    </label>
    <input type="range" id="clipSlider" min="-150" max="150" value="150" style="width:100%;">
  </div>

  <div id="status">Выберите файлы пациента...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf4f6f8);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
camera.position.set(0, 0, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.localClippingEnabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

const clipPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 150);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('clipSlider').addEventListener('input', (e) => {
  clipPlane.constant = Number(e.target.value);
});

document.getElementById('clipEnabled').addEventListener('change', (e) => {
  const enabled = e.target.checked;
  scene.traverse((child) => {
    if (child.isMesh && child.material) {
      child.material.clippingPlanes = enabled ? [clipPlane] : [];
      child.material.needsUpdate = true;
    }
  });
});

window.runPrediction = async function () {
  const status = document.getElementById('status');
  const formData = new FormData();
  const ids = ['flair', 't1', 't1ce', 't2'];

  for (const id of ids) {
    const file = document.getElementById(id).files[0];
    if (!file) { status.innerHTML = "<span style='color: #d97706;'>⚠️ Выберите все файлы</span>"; return; }
    formData.append(id, file);
  }

  status.innerHTML = "<span style='color: #2563eb;'>⏳ Обработка на сервере...</span>";

  try {
    const response = await fetch("http://localhost:8000/predict", { method: "POST", body: formData });
    if (!response.ok) throw new Error("Ошибка сервера: " + response.status);

    const url = URL.createObjectURL(await response.blob());
    new GLTFLoader().load(url, (gltf) => {
      // Удаляем старые модели (все объекты типа Group)
      scene.children = scene.children.filter(c => c.isLight || c.type !== 'Group');

      const model = gltf.scene;
      let meshes = [];
      model.traverse(n => { if (n.isMesh) meshes.push(n); });
      meshes.sort((a, b) => b.geometry.attributes.position.count - a.geometry.attributes.position.count);

      meshes.forEach((mesh, index) => {
        const isBrain = index === 0;
        mesh.material = new THREE.MeshStandardMaterial({
          color: isBrain ? 0xd8dee8 : 0xd72638,
          opacity: isBrain ? 0.22 : 1.0,
          transparent: isBrain,
          roughness: 0.5,
          metalness: 0.2,
          side: THREE.DoubleSide,
          clippingPlanes: document.getElementById('clipEnabled').checked ? [clipPlane] : [],
          emissive: isBrain ? 0x000000 : 0x330000
        });
      });

      scene.add(model);
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.set(maxDim, maxDim, maxDim);
      controls.target.set(0, 0, 0);
      controls.update();

      status.innerHTML = "<span style='color: #16a34a;'>✅ Анализ завершен!</span>";
    });
  } catch (err) {
    status.innerHTML = `<span style='color: #dc2626;'>❌ ${err.message}</span>`;
  }
};
</script>
</body>
</html>
